spring.application.name=demo

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Note: The database URL, username, and password are stored in environment variables for security reasons. 
spring.datasource.url=jdbc:postgresql://<DB_URL>/cmpt276_2
spring.datasource.username=cmpt276_2_user
spring.datasource.password=<DB_PWD>
spring.datasource.driver-class-name=org.postgresql.Driver

# Explicitly set PostgreSQL dialect for Hibernate 7.x
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Defer datasource initialization until connection is available
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always